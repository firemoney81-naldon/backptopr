  <style>
        :root {

            --text-sub: #636e72;

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        header p { opacity: 0.9; font-weight: 300; }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .category-section {
            margin-bottom: 4rem;
        }

        .category-title {
            font-size: 1.5rem;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
            font-weight: 700;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.15);
        }

        .card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card .tag {
            font-size: 0.75rem;
            background: var(--pastel-1);
            color: #0288d1;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .card .title {

            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #1e272e;
        }

        .card .desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 15px;
        }

        .card .btn {
            margin-top: auto;
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 700;
            text-align: right;
        }

        footer {
            background: #2d3436;
            color: #dfe6e9;
            text-align: center;
            padding: 2rem;
            margin-top: 5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; }
            .grid-container { grid-template-columns: 1fr; }

    }

        section.appendChild(title);

        for(let i=0; i<count; i++) {
            if(dataIndex >= shuffledData.length) break;
            
            const item = shuffledData[dataIndex];
            const card = document.createElement('article');
            card.className = 'card';
            card.innerHTML = `

                    <div class="btn">상세보기 →</div>
                </a>
            `;
            grid.appendChild(card);
            dataIndex++;
        }
        
        section.appendChild(grid);
        contentArea.appendChild(section);
    });
